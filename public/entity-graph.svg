<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <!-- Subtle entity-graph background. Strokes and fills are solid black —
       the actual colour is applied via mask-image + background-color in CSS,
       so the SVG works identically across browsers (no currentColor
       inheritance issues). -->
